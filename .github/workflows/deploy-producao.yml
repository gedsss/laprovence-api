name: Deploy Producao API

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: producao-api
  cancel-in-progress: true

jobs:
  validate:
    name: Validar API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Dependency audit
        run: npm audit --audit-level=high

      - name: Generate Prisma client
        run: npm run prisma:generate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost/ci

      - name: Typecheck
        run: npm run typecheck

  deploy:
    name: Publicar API producao
    needs: validate
    runs-on: ubuntu-latest
    environment: producao-api
    env:
      PROD_BASE_DIR: ${{ vars.PROD_BASE_DIR || '/home/lpvadmin/laprovence' }}
      PROD_SERVICE_NAME: ${{ vars.PROD_SERVICE_NAME || 'laprovence-api.service' }}
      PROD_API_PORT: ${{ vars.PROD_API_PORT || '3668' }}

    steps:
      - name: Validate deploy secrets
        env:
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          PROD_SSH_USER: ${{ secrets.PROD_SSH_USER }}
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
        run: |
          test -n "$PROD_SSH_HOST" || (echo "Configure PROD_SSH_HOST." && exit 1)
          test -n "$PROD_SSH_USER" || (echo "Configure PROD_SSH_USER." && exit 1)
          test -n "$PROD_SSH_KEY" || (echo "Configure PROD_SSH_KEY." && exit 1)

      - name: Configure SSH
        env:
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
          PROD_SSH_PORT: ${{ secrets.PROD_SSH_PORT || '22' }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$PROD_SSH_KEY" > ~/.ssh/prod_key
          chmod 600 ~/.ssh/prod_key
          ssh-keyscan -p "$PROD_SSH_PORT" "$PROD_SSH_HOST" >> ~/.ssh/known_hosts

      - name: Deploy over SSH
        env:
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          PROD_SSH_USER: ${{ secrets.PROD_SSH_USER }}
          PROD_SSH_PORT: ${{ secrets.PROD_SSH_PORT || '22' }}
        run: |
          ssh -i ~/.ssh/prod_key -p "$PROD_SSH_PORT" "$PROD_SSH_USER@$PROD_SSH_HOST" \
            "GITHUB_SHA='$GITHUB_SHA' PROD_BASE_DIR='$PROD_BASE_DIR' PROD_SERVICE_NAME='$PROD_SERVICE_NAME' PROD_API_PORT='$PROD_API_PORT' bash -s" <<'REMOTE'
          set -euo pipefail

          REPO_URL="https://github.com/gedsss/laprovence-api.git"
          BRANCH="main"
          PROD_BASE_DIR="${PROD_BASE_DIR/#\~/$HOME}"
          RELEASES_DIR="$PROD_BASE_DIR/releases"
          SHARED_DIR="$PROD_BASE_DIR/shared"
          CURRENT_LINK="$PROD_BASE_DIR/current-api"
          ENV_FILE="$SHARED_DIR/api.env"
          SHORT_SHA="$(printf '%s' "$GITHUB_SHA" | cut -c1-7)"
          STAMP="$(date -u +%Y%m%d-%H%M%S)"
          RELEASE_DIR="$RELEASES_DIR/api-$SHORT_SHA-$STAMP"

          if [ ! -f "$ENV_FILE" ]; then
            echo "Crie $ENV_FILE com as variaveis de producao."
            exit 1
          fi

          mkdir -p "$RELEASES_DIR"
          git clone --branch "$BRANCH" --single-branch "$REPO_URL" "$RELEASE_DIR"
          cd "$RELEASE_DIR"
          git fetch origin "$GITHUB_SHA"
          git checkout --detach "$GITHUB_SHA"
          ln -sfn "$ENV_FILE" .env.production

          set -a
          . ./.env.production
          set +a

          npm ci
          npm run prisma:generate
          npm run prisma:migrate:deploy

          PREVIOUS_RELEASE=""
          if [ -L "$CURRENT_LINK" ]; then
            PREVIOUS_RELEASE="$(readlink -f "$CURRENT_LINK")"
          fi

          ln -sfn "$RELEASE_DIR" "$CURRENT_LINK"

          if ! sudo -n /usr/bin/systemctl restart "$PROD_SERVICE_NAME"; then
            if [ -n "$PREVIOUS_RELEASE" ] && [ -d "$PREVIOUS_RELEASE" ]; then
              ln -sfn "$PREVIOUS_RELEASE" "$CURRENT_LINK"
              sudo -n /usr/bin/systemctl restart "$PROD_SERVICE_NAME" || true
            fi
            exit 1
          fi

          sudo -n /usr/bin/systemctl is-active "$PROD_SERVICE_NAME"
          printf 'Deploy concluido: %s\n' "$RELEASE_DIR"
          REMOTE
